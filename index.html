<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D Water Cup Simulation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    canvas {
      background: #0f0f1e;
      border: 2px solid #1e2d50;
      border-radius: 8px;
      display: block;
    }

    #info {
      margin-top: 12px;
      color: #6a82a0;
      font-size: 14px;
      letter-spacing: 0.4px;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="600" height="600"></canvas>
  <p id="info">← → Arrow keys / swipe to tilt the cup &nbsp;|&nbsp; Click to add water</p>

  <!-- planck.js physics engine (Box2D port) -->
  <script src="https://cdn.jsdelivr.net/npm/planck@1.0.5/dist/planck.min.js"></script>

  <script>
  (function () {
    'use strict';

    /* ── Canvas setup ──────────────────────────────────────────── */
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const W = canvas.width;
    const H = canvas.height;

    /* ── Physics world ─────────────────────────────────────────── */
    const world = planck.World({ gravity: planck.Vec2(0, -10) });

    /* world → screen transform (Y axis flipped) */
    const SCALE = 50;        // pixels per metre (zoomed out from 80)
    const OX    = W * 0.22;  // screen x for world x = 0 (moved to left)
    const OY    = H * 0.38;  // screen y for world y = 0 (moved to top)

    function ws(x, y)  { return [OX + x * SCALE, OY - y * SCALE]; }   // world → screen
    function sw(cx, cy){ return [(cx - OX) / SCALE, (OY - cy) / SCALE]; } // screen → world

    /* ── Table surface (static) ─────────────────────────────────── */
    const TABLE_Y     = -6.5;   // table surface Y position (metres)
    const TABLE_LEFT  = 1.5;    // left edge of table
    const TABLE_RIGHT = 9.0;    // right edge of table
    const TABLE_THICKNESS = 0.5; // table thickness for solid collision

    const tableBody = world.createBody({ type: 'static', position: planck.Vec2(0, 0) });
    // Use a Box instead of Edge so the cup walls collide properly when tilted
    const tableWidth = (TABLE_RIGHT - TABLE_LEFT) / 2;
    const tableCenterX = (TABLE_LEFT + TABLE_RIGHT) / 2;
    tableBody.createFixture(
      planck.Box(tableWidth, TABLE_THICKNESS / 2, planck.Vec2(tableCenterX, TABLE_Y - TABLE_THICKNESS / 2)),
      { friction: 0.6, restitution: 0.05 }
    );

    /* ── Empty cup on table (dynamic, can tip over) ─────────────── */
    const CUP2_X  = 5.5;        // x position of empty cup
    const CUP2_HW = 0.90;       // half-width at base (slightly smaller than pouring cup)
    const CUP2_CH = 2.40;       // cup wall height
    const CUP2_FLR = 0.22;      // outward flare

    // Create a dynamic body for the empty cup so it can tip over
    const emptyCupBody = world.createBody({
      type: 'dynamic',
      position: planck.Vec2(CUP2_X, TABLE_Y + 0.01),  // sitting on table
      angularDamping: 1.0,      // resist spinning too fast
      linearDamping: 0.5
    });

    // Cup walls as edge fixtures attached to the dynamic body
    const emptyCupWallDef = { friction: 0.3, restitution: 0.1, density: 0.5 };

    // bottom edge
    emptyCupBody.createFixture(
      planck.Edge(planck.Vec2(-CUP2_HW, 0), planck.Vec2(CUP2_HW, 0)),
      emptyCupWallDef
    );
    // left wall
    emptyCupBody.createFixture(
      planck.Edge(planck.Vec2(-CUP2_HW, 0), planck.Vec2(-CUP2_HW - CUP2_FLR, CUP2_CH)),
      emptyCupWallDef
    );
    // right wall
    emptyCupBody.createFixture(
      planck.Edge(planck.Vec2(CUP2_HW, 0), planck.Vec2(CUP2_HW + CUP2_FLR, CUP2_CH)),
      emptyCupWallDef
    );

    // Add a small bottom mass to give the cup stability (like a weighted base)
    emptyCupBody.createFixture(
      planck.Box(CUP2_HW * 0.8, 0.08, planck.Vec2(0, 0.08)),
      { density: 1.0, friction: 0.3 }
    );

    // Add small circles at bottom corners so cup walls collide with the table when tilted
    const cornerRadius = 0.06;
    emptyCupBody.createFixture(
      planck.Circle(planck.Vec2(-CUP2_HW, 0), cornerRadius),
      { density: 0.1, friction: 0.6, restitution: 0.05 }
    );
    emptyCupBody.createFixture(
      planck.Circle(planck.Vec2(CUP2_HW, 0), cornerRadius),
      { density: 0.1, friction: 0.6, restitution: 0.05 }
    );

    /* ── Cup (single static body with three edge fixtures) ─────── */
    const HW  = 1.20;   // half-width at base (metres)
    const CH  = 3.00;   // cup wall height
    const FLR = 0.28;   // outward flare per side at the top
    const CUP_X = 1.5;

    const cupBody = world.createBody({ type: 'static', position: planck.Vec2(CUP_X, 0) });
    const wallDef = { friction: 0.3, restitution: 0.1 };

    // bottom edge
    cupBody.createFixture(
      planck.Edge(planck.Vec2(-HW, 0),         planck.Vec2(HW, 0)),         wallDef);
    // left wall (slightly flared outward)
    cupBody.createFixture(
      planck.Edge(planck.Vec2(-HW, 0),         planck.Vec2(-HW - FLR, CH)), wallDef);
    // right wall
    cupBody.createFixture(
      planck.Edge(planck.Vec2(HW, 0),          planck.Vec2(HW + FLR, CH)),  wallDef);

    let tilt = 0;                       // current cup rotation angle (radians)
    const MAX_TILT  = Math.PI / 2;      // maximum tilt (90°)
    const TILT_STEP = 0.028;            // radians applied per animation frame

    /* ── Water particles ───────────────────────────────────────── */
    const PR   = 0.15;     // visual particle radius (metres → ~4 px)
    const PR_C = 0.12;     // collision radius (smaller so particles overlap visually)
    const parts = [];

    function spawnParticle(wx, wy) {
      const body = world.createBody({
        type:           'dynamic',
        position:       planck.Vec2(wx, wy),
        linearDamping:  1.2,
        angularDamping: 0.5,
        allowSleep:     true
      });
      body.createFixture(planck.Circle(PR_C), {
        density:     2.0,
        friction:    0.05,
        restitution: 0.15
      });
      parts.push(body);
    }

    /* Hex-packed initial fill (~110 particles) */
    function seedWater() {
      const sp   = 0.19;   // centre-to-centre spacing
      const cols = 20;
      const rows = 18;
      const x0   = CUP_X - (cols - 1) * sp * 0.5;  // center water in the cup
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const x = x0 + c * sp + (r % 2) * sp * 0.5;   // alternating-row offset for hex packing
          const y = PR + 0.06 + r * sp * 0.866;
          if (Math.abs(x - CUP_X) < HW - PR) spawnParticle(x, y);  // check relative to cup center
        }
      }
    }

    seedWater();

    /* ── Input handling ────────────────────────────────────────── */
    const held = {};
    window.addEventListener('keydown', e => {
      held[e.key] = true;
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.preventDefault();
    });
    window.addEventListener('keyup', e => { held[e.key] = false; });

    canvas.addEventListener('click', e => {
      if (gameOver) { resetGame(); return; }
      const rect = canvas.getBoundingClientRect();
      const [wx, wy] = sw(e.clientX - rect.left, e.clientY - rect.top);
      for (let i = 0; i < 6; i++) {
        spawnParticle(
          wx + (Math.random() - 0.5) * 0.4,
          wy + (Math.random() - 0.5) * 0.4
        );
      }
    });

    /* ── Touch / swipe input ───────────────────────────────────── */
    let touchStartX  = null;
    let touchStartY  = null;
    let lastTouchX   = null;
    let swipeTiltDelta = 0;           // accumulated tilt from swipe, applied each frame
    const SWIPE_SENSITIVITY = 0.004;  // radians per pixel of horizontal swipe movement
    const TAP_THRESHOLD     = 10;     // pixels — within this counts as a tap, not a swipe

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      if (!e.touches.length) return;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      lastTouchX  = touchStartX;
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (!e.touches.length || lastTouchX === null) return;
      const currentX = e.touches[0].clientX;
      swipeTiltDelta += (currentX - lastTouchX) * SWIPE_SENSITIVITY;
      lastTouchX = currentX;
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      if (gameOver) { resetGame(); touchStartX = null; touchStartY = null; lastTouchX = null; swipeTiltDelta = 0; return; }
      const t  = e.changedTouches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;
      // treat as a tap if the finger didn't move far
      if (Math.abs(dx) < TAP_THRESHOLD && Math.abs(dy) < TAP_THRESHOLD) {
        const rect = canvas.getBoundingClientRect();
        const [wx, wy] = sw(t.clientX - rect.left, t.clientY - rect.top);
        for (let i = 0; i < 6; i++) {
          spawnParticle(
            wx + (Math.random() - 0.5) * 0.4,
            wy + (Math.random() - 0.5) * 0.4
          );
        }
      }
      touchStartX    = null;
      touchStartY    = null;
      lastTouchX     = null;
      swipeTiltDelta = 0;
    }, { passive: false });

    /* ── Rendering ─────────────────────────────────────────────── */
    function drawCup() {
      ctx.save();
      ctx.strokeStyle = '#c8deff';
      ctx.lineWidth   = 3.5;
      ctx.lineCap     = 'round';
      ctx.shadowColor = '#5577bb';
      ctx.shadowBlur  = 8;

      for (let f = cupBody.getFixtureList(); f; f = f.getNext()) {
        const s = f.getShape();
        if (s.getType() !== 'edge') continue;
        const a = cupBody.getWorldPoint(s.m_vertex1);
        const b = cupBody.getWorldPoint(s.m_vertex2);
        ctx.beginPath();
        ctx.moveTo(...ws(a.x, a.y));
        ctx.lineTo(...ws(b.x, b.y));
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawTable() {
      ctx.save();
      ctx.fillStyle   = '#8b7355';
      ctx.strokeStyle = '#5a4a3a';
      ctx.lineWidth   = 2;
      ctx.shadowColor = '#5a4a3a';
      ctx.shadowBlur  = 6;

      // Draw table as a filled rectangle matching the Box fixture
      const [x1, y1] = ws(TABLE_LEFT, TABLE_Y);
      const [x2, y2] = ws(TABLE_RIGHT, TABLE_Y - TABLE_THICKNESS);
      ctx.fillRect(x1, y1, x2 - x1, y2 - y1);
      ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
      ctx.restore();
    }

    function drawEmptyCup() {
      ctx.save();
      ctx.strokeStyle = '#a0c8ff';
      ctx.lineWidth   = 3;
      ctx.lineCap     = 'round';
      ctx.shadowColor = '#4466aa';
      ctx.shadowBlur  = 6;

      for (let f = emptyCupBody.getFixtureList(); f; f = f.getNext()) {
        const s = f.getShape();
        if (s.getType() !== 'edge') continue;
        const a = emptyCupBody.getWorldPoint(s.m_vertex1);
        const b = emptyCupBody.getWorldPoint(s.m_vertex2);
        ctx.beginPath();
        ctx.moveTo(...ws(a.x, a.y));
        ctx.lineTo(...ws(b.x, b.y));
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawParticles() {
      const r = PR * SCALE;   // radius in pixels

      /* main fill */
      ctx.save();
      ctx.fillStyle   = '#1565c0';
      ctx.strokeStyle = 'rgba(100, 181, 246, 0.60)';
      ctx.lineWidth   = 1;
      for (const p of parts) {
        const pos = p.getPosition();
        ctx.beginPath();
        ctx.arc(...ws(pos.x, pos.y), r, 0, Math.PI * 2);
        ctx.fill();
        // ctx.stroke();
      }

      /* specular highlight dot */
      /* ctx.fillStyle = 'rgba(255, 255, 255, 0.42)';
      for (const p of parts) {
        const pos = p.getPosition();
        const [sx, sy] = ws(pos.x, pos.y);
        ctx.beginPath();
        ctx.arc(sx - r * 0.3, sy - r * 0.3, r * 0.22, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore(); */
    }

    /* ── Game state: spill detection & countdown ──────────────── */
    const SPILL_ANGLE   = Math.PI / 3;   // 60° — beyond this the cup is "spilled"
    const COUNTDOWN_SEC = 10;             // total countdown seconds

    let gameOver      = false;
    let gameOverMsg   = '';
    let countdownLeft = COUNTDOWN_SEC;   // seconds remaining (float)
    let lastFrameTs   = null;            // for countdown delta-time

    function resetGame() {
      /* reset empty cup */
      emptyCupBody.setTransform(planck.Vec2(CUP2_X, TABLE_Y + 0.01), 0);
      emptyCupBody.setLinearVelocity(planck.Vec2(0, 0));
      emptyCupBody.setAngularVelocity(0);
      emptyCupBody.setAwake(true);

      /* reset pouring cup tilt */
      tilt = 0;
      cupBody.setTransform(planck.Vec2(CUP_X, 0), 0);

      /* destroy all existing particle bodies, then re-seed */
      for (const p of parts) world.destroyBody(p);
      parts.splice(0, parts.length);
      seedWater();

      /* reset state */
      gameOver      = false;
      gameOverMsg   = '';
      countdownLeft = COUNTDOWN_SEC;
      lastFrameTs   = null;
      prev          = null;
      acc           = 0;
    }

    function drawHUD() {
      ctx.save();
      ctx.fillStyle = '#3c4f66';
      ctx.font      = '12px Arial, sans-serif';
      ctx.fillText('Particles: ' + parts.length, 10, 22);

      /* countdown timer (top-right corner) */
      const timerText = Math.ceil(countdownLeft) + 's';
      ctx.fillStyle   = countdownLeft <= 2 ? '#ff4444' : '#6a82a0';
      ctx.font        = '20px Arial, sans-serif';
      ctx.textAlign   = 'right';
      ctx.fillText(timerText, W - 14, 28);
      ctx.restore();
    }

    function drawGameOver() {
      /* darken background */
      ctx.save();
      ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
      ctx.fillRect(0, 0, W, H);

      /* message */
      ctx.fillStyle = '#ffffff';
      ctx.font      = 'bold 28px Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(gameOverMsg, W / 2, H / 2 - 20);

      /* sub-prompt */
      ctx.font      = '18px Arial, sans-serif';
      ctx.fillStyle = '#aaaaaa';
      ctx.fillText('Click or tap to try again', W / 2, H / 2 + 24);
      ctx.restore();
    }

    /* ── Main animation loop ───────────────────────────────────── */
    const FIXED_DT = 1 / 60;
    let prev = null;
    let acc  = 0;

    function frame(ts) {
      requestAnimationFrame(frame);

      if (!prev) { prev = ts; return; }
      const dtSec = Math.min((ts - prev) / 1000, 0.05);   // cap at 50 ms
      acc += dtSec;
      prev = ts;

      /* ── game-over overlay (freeze physics, just draw) ──── */
      if (gameOver) {
        ctx.clearRect(0, 0, W, H);
        drawTable();
        drawCup();
        drawEmptyCup();
        drawParticles();
        drawHUD();
        drawGameOver();
        return;
      }

      /* ── countdown timer ─────────────────────────────────── */
      countdownLeft -= dtSec;
      if (countdownLeft <= 0) {
        countdownLeft = 0;
        gameOver    = true;
        gameOverMsg = "Time's up! Try again";
      }

      /* ── spill detection (check empty cup angle) ────────── */
      const cupAngle = Math.abs(emptyCupBody.getAngle());
      if (cupAngle > SPILL_ANGLE) {
        gameOver    = true;
        gameOverMsg = 'Cup spilled! Try again';
      }

      /* tilt the cup (keyboard + swipe) */
      let moved = false;
      if (held['ArrowLeft']  && tilt > -MAX_TILT) { tilt -= TILT_STEP; moved = true; }
      if (held['ArrowRight'] && tilt <  MAX_TILT) { tilt += TILT_STEP; moved = true; }
      if (swipeTiltDelta !== 0) {
        tilt += swipeTiltDelta;
        tilt = Math.max(-MAX_TILT, Math.min(MAX_TILT, tilt));
        swipeTiltDelta = 0;
        moved = true;
      }
      if (moved) {
        cupBody.setTransform(planck.Vec2(CUP_X, 0), tilt);
        for (const p of parts) p.setAwake(true);   // wake sleeping particles
      }

      /* fixed-timestep physics */
      while (acc >= FIXED_DT) {
        world.step(FIXED_DT, 8, 3);
        acc -= FIXED_DT;
      }

      /* render */
      ctx.clearRect(0, 0, W, H);
      drawTable();
      drawCup();
      drawEmptyCup();
      drawParticles();
      drawHUD();
    }

    requestAnimationFrame(frame);
  }());
  </script>
</body>
</html>
